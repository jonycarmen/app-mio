[alembic]
# Ruta de los scripts de migración
script_location = migrations

# Plantilla de nombres de archivo para nuevas migraciones
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path con la raíz del proyecto para que los imports de app/ funcionen
prepend_sys_path = .

# URL de la base de datos (sobreescrita en env.py con app.config.settings)
sqlalchemy.url = sqlite:///./app.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
