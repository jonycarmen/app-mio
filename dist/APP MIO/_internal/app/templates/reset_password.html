<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/static/manifest.json">
    <title>Nueva contraseña</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; background: var(--bg, #0f172a); padding: 1rem env(safe-area-inset-right,0) 1rem env(safe-area-inset-left,0); }
        .card { background: var(--card-bg, #1e293b); border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
        .card h1 { margin: 0 0 .25rem; font-size: 1.4rem; color: var(--text, #e2e8f0); }
        .card .subtitle { margin: 0 0 2rem; font-size: .85rem; color: var(--text-muted, #94a3b8); }
        .field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1.1rem; }
        .field label { font-size: .8rem; font-weight: 600; color: var(--text-muted, #94a3b8); text-transform: uppercase; letter-spacing: .05em; }
        .field .input-wrap { position: relative; }
        .field input { width: 100%; box-sizing: border-box; padding: .7rem .9rem; padding-right: 2.8rem; border-radius: 6px; border: 1px solid var(--border, #334155); background: var(--input-bg, #0f172a); color: var(--text, #e2e8f0); font-size: 16px; }
        .field input:focus { outline: none; border-color: var(--primary, #6366f1); box-shadow: 0 0 0 2px rgba(99,102,241,.25); }
        .toggle-pw { position: absolute; right: .5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748b; font-size: .9rem; padding: .4rem; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .toggle-pw:hover { color: #94a3b8; }
        .strength-bar { height: 4px; border-radius: 2px; margin-top: .35rem; transition: background .25s, width .25s; }
        .strength-hint { font-size: .75rem; margin-top: .2rem; }
        .btn-submit { width: 100%; padding: .75rem; border-radius: 6px; border: none; background: var(--primary, #6366f1); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: .5rem; min-height: 48px; }
        .btn-submit:hover { background: #4f46e5; }
        .alert-error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); border-radius: 6px; padding: .6rem .9rem; margin-bottom: 1.2rem; color: #fca5a5; font-size: .88rem; }
        .back-link { display: flex; align-items: center; justify-content: center; text-align: center; margin-top: 1.2rem; font-size: .85rem; color: var(--text-muted, #94a3b8); text-decoration: none; min-height: 44px; }
        .back-link:hover { color: var(--primary, #6366f1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>People Manager</h1>
        <p class="subtitle">Establecer nueva contraseña</p>

        {% if error %}
        <div class="alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/reset-password" id="reset-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="field">
                <label for="new_password">Nueva contraseña</label>
                <div class="input-wrap">
                    <input type="password" id="new_password" name="new_password"
                           autocomplete="new-password" required minlength="8" autofocus
                           oninput="checkStrength(this.value)">
                    <button type="button" class="toggle-pw" onclick="togglePw('new_password', this)" tabindex="-1" aria-label="Mostrar/ocultar contraseña">👁</button>
                </div>
                <div class="strength-bar" id="strength-bar" style="width:0;background:#ef4444;"></div>
                <span class="strength-hint" id="strength-hint" style="color:#64748b;"></span>
            </div>

            <div class="field">
                <label for="confirm_password">Confirmar contraseña</label>
                <div class="input-wrap">
                    <input type="password" id="confirm_password" name="confirm_password"
                           autocomplete="new-password" required minlength="8"
                           oninput="checkMatch()">
                    <button type="button" class="toggle-pw" onclick="togglePw('confirm_password', this)" tabindex="-1" aria-label="Mostrar/ocultar contraseña">👁</button>
                </div>
                <span class="strength-hint" id="match-hint" style="color:#64748b;"></span>
            </div>

            <button type="submit" class="btn-submit">Guardar contraseña</button>
        </form>

        <a href="/admin/login" class="back-link">← Volver al inicio de sesión</a>
    </div>

    <script>
        function togglePw(id, btn) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        function checkStrength(val) {
            const bar = document.getElementById('strength-bar');
            const hint = document.getElementById('strength-hint');
            let score = 0;
            if (val.length >= 8) score++;
            if (val.length >= 12) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { color: '#ef4444', label: '', pct: '0%' },
                { color: '#ef4444', label: 'Muy débil', pct: '20%' },
                { color: '#f97316', label: 'Débil', pct: '40%' },
                { color: '#eab308', label: 'Media', pct: '60%' },
                { color: '#22c55e', label: 'Fuerte', pct: '80%' },
                { color: '#16a34a', label: 'Muy fuerte', pct: '100%' },
            ];
            const lvl = val.length === 0 ? levels[0] : levels[score];
            bar.style.width = lvl.pct;
            bar.style.background = lvl.color;
            hint.textContent = lvl.label;
            hint.style.color = lvl.color;
        }

        function checkMatch() {
            const pw = document.getElementById('new_password').value;
            const conf = document.getElementById('confirm_password').value;
            const hint = document.getElementById('match-hint');
            if (!conf) { hint.textContent = ''; return; }
            if (pw === conf) {
                hint.textContent = 'Las contraseñas coinciden';
                hint.style.color = '#22c55e';
            } else {
                hint.textContent = 'Las contraseñas no coinciden';
                hint.style.color = '#ef4444';
            }
        }
    </script>
</body>
</html>
